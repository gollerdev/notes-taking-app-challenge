# Production compose: all services behind Caddy reverse proxy with auto-TLS.
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Required: .env.production (see .env.production.example)

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-notes}
      POSTGRES_USER: ${DB_USER:-notes}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notes}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-notes} -d ${DB_NAME:-notes}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: notes-web:prod
    build:
      context: ./backend
      target: prod
    env_file:
      - ./.env.production
    environment:
      DB_HOST: db
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    image: notes-frontend:prod
    build:
      context: ./frontend
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://localhost}
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://web:8000}
    depends_on:
      web:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - static_files:/srv/static:ro
    depends_on:
      - web
      - frontend

volumes:
  postgres_data_prod:
  caddy_data:
  caddy_config:
  static_files:
