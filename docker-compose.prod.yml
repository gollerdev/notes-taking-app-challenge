# Production-style compose: builds the slim multi-stage targets (no bind
# mounts, no hot reload). Use this to validate the smaller images:
#
#   docker compose -f docker-compose.prod.yml up --build
#
# Image sizes can be compared with:
#   docker images | grep notes-taking-app-challenge

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-notes}
      POSTGRES_USER: ${DB_USER:-notes}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notes}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-notes} -d ${DB_NAME:-notes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  web:
    image: notes-web:prod
    build:
      context: ./backend
      target: prod
    env_file:
      - ./.env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "8000:8000"

  frontend:
    image: notes-frontend:prod
    build:
      context: ./frontend
      target: runner
      args:
        # Baked into the client bundle at build time (browser-facing URL).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      # Server-component fetches resolve the backend over the compose network.
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://web:8000}
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data_prod:
