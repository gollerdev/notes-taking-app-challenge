services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      # Host 5433 avoids clashing with a Postgres already on the host's 5432.
      # In-network services still reach Postgres at db:5432.
      - "5433:5432"

  web:
    build: .
    env_file:
      - .env
    environment:
      # Force the in-network host regardless of what .env carries.
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      # Keep the container's Linux .venv from being shadowed by the host
      # (Windows) .venv via the source bind mount above.
      - /app/.venv

volumes:
  postgres_data:
