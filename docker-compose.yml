# Root compose file: brings up the full stack (Postgres + backend + frontend).
# For backend-only work, you can still use backend/docker-compose.yml directly.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-notes}
      POSTGRES_USER: ${DB_USER:-notes}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-notes} -d ${DB_NAME:-notes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  web:
    build: ./backend
    env_file:
      - ./.env
    environment:
      # Override DB_HOST so the app resolves Postgres via the compose network,
      # regardless of what .env sets for local (non-Docker) use.
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv

  frontend:
    build: ./frontend
    environment:
      # NEXT_PUBLIC_API_URL is browser-facing (host resolution). Use INTERNAL_API_URL
      # for server-component fetches inside the container (resolves via Docker network).
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://web:8000}
      # Enable filesystem polling so Next.js Fast Refresh detects edits across the
      # Windows -> Linux bind mount (inotify events don't propagate there).
      WATCHPACK_POLLING: "true"
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
