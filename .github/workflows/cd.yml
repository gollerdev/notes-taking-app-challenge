name: CD

on:
  push:
    branches: [main]

# Only one deploy at a time; queue newer pushes instead of running in parallel.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # Gate: CI must pass before deploying (CI runs on push to main too).
  deploy:
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/notes-app
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            # Wait for services to be healthy before checking
            sleep 10
            curl -f https://${{ secrets.DOMAIN }}/api/v1/health/ || exit 1
            echo "Deploy successful"
